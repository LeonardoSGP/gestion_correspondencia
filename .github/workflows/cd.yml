# ═══════════════════════════════════════════════════════════════════════════════
# CD — Entrega Continua con Docker Hub
# Sistema de Gestión de Correspondencia
# ═══════════════════════════════════════════════════════════════════════════════
#
# Disparador:
#   • Deploy manual desde la pestaña Actions → "Run workflow"
#
# Secrets requeridos (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  — usuario de Docker Hub
#   DOCKERHUB_TOKEN     — Access Token de Docker Hub
# ═══════════════════════════════════════════════════════════════════════════════

name: CD — Docker Build & Push

on:
  workflow_dispatch:

concurrency:
  group: cd-master
  cancel-in-progress: false

jobs:
  docker-build-push:
    name: 🐳 Docker Build & Push → Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🏷️ Extraer metadatos — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/correspondencia-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: 🏷️ Extraer metadatos — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/correspondencia-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: ⚙️ Configurar QEMU (multi-plataforma)
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build & Push — Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: 🏗️ Build & Push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: 📋 Resumen del deploy
        run: |
          echo "## 🚀 Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Imagen | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`correspondencia-backend\` | ${{ steps.meta-backend.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`correspondencia-frontend\` | ${{ steps.meta-frontend.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
