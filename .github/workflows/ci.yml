# ═══════════════════════════════════════════════════════════════════════════════
# CI — Integración Continua
# Sistema de Gestión de Correspondencia
# ═══════════════════════════════════════════════════════════════════════════════
#
# Disparadores:
#   • Cualquier push a `master`
#   • Cualquier Pull Request que apunte a `master`
#
# Jobs:
#   1. backend-ci  → install → type-check → test → build
#   2. frontend-ci → install → build (Vite)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI — Integración Continua

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — TypeScript build + tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: 🔧 Backend CI (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias (npm ci)
        run: npm ci

      - name: 🔍 Verificación de tipos TypeScript
        run: npx tsc --noEmit

      - name: 🧪 Tests unitarios
        run: npm test -- --testPathPattern="unit" --no-coverage --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-correspondencia-12345' }}
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-correspondencia-12345' }}
          JWT_REFRESH_EXPIRES_IN: 7d
          DATABASE_URL: mysql://root:ci_password@127.0.0.1:3306/correspondencia_test

      - name: 📊 Reporte de cobertura (jest --coverage)
        run: npm run test:coverage -- --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-correspondencia-12345' }}
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-correspondencia-12345' }}
          JWT_REFRESH_EXPIRES_IN: 7d
          DATABASE_URL: mysql://root:ci_password@127.0.0.1:3306/correspondencia_test

      - name: 📤 Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

      - name: 🏗️ Build de producción (tsc)
        run: npm run build

      - name: 📤 Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend — build de Vite
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend CI (Vite build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias (npm ci)
        run: npm ci

      - name: 🏗️ Build de producción (Vite)
        run: npm run build

      - name: 📤 Subir artefacto del dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
