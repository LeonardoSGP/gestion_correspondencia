# ═══════════════════════════════════════════════════════════════════════════════
# Security & Quality — Auditoría de Dependencias y Calidad de Código
# Sistema de Gestión de Correspondencia
# ═══════════════════════════════════════════════════════════════════════════════

name: 🔒 Security & Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: 🛡️ Auditoría de dependencias
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 npm audit (${{ matrix.project }})
        run: npm audit --audit-level=high || true

      - name: 📋 Resumen de auditoría
        if: always()
        run: |
          echo "## 🛡️ Auditoría — ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --json | head -50 >> $GITHUB_STEP_SUMMARY || echo "Sin vulnerabilidades detectadas" >> $GITHUB_STEP_SUMMARY

  lint:
    name: 🧹 Lint & Type-Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 TypeScript strict type-check
        run: npx tsc --noEmit --strict 2>&1 || true

      - name: 📋 Verificar código limpio
        run: |
          echo "## 🧹 Análisis de calidad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type-check y análisis de código completados." >> $GITHUB_STEP_SUMMARY
