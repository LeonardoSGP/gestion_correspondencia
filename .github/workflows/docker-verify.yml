# ==============================================================================
# Docker Compose Verify -- Verificacion de Containerizacion
# Sistema de Gestion de Correspondencia
# ==============================================================================

name: Docker Verify

on:
  push:
    branches: [master]
    paths:
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - 'backend/docker-entrypoint.sh'
      - 'backend/.dockerignore'
      - 'frontend/.dockerignore'
      - '.github/workflows/docker-verify.yml'
  pull_request:
    branches: [master]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Validar sintaxis (docker compose config)
        run: docker compose config --quiet

      - name: Mostrar configuracion resuelta
        run: |
          echo "## Docker Compose -- Configuracion validada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          docker compose config >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Build imagenes Docker (dry-run)
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} (sin push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: correspondencia-${{ matrix.service }}:ci-test
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Resumen
        run: |
          echo "## Docker Build -- ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Imagen \`correspondencia-${{ matrix.service }}:ci-test\` construida correctamente." >> $GITHUB_STEP_SUMMARY
